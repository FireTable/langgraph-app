name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Per-ref concurrency: re-pushing a PR / branch cancels the previous
# in-flight run (same branch, same workflow). Different refs run in
# parallel — `dev` push doesn't cancel `main` push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint + oxfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `next build` statically evaluates App Router routes; routes that
    # import `backend/store.ts` or `backend/checkpointer.ts` need the
    # langgraph tables present before the build (otherwise the page-data
    # collection crashes on the first query). Run `pnpm db:migrate` once
    # to bring the schema up — the build-time DB can be empty otherwise.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: langgraph_app_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d langgraph_app_build"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/langgraph_app_build
      BETTER_AUTH_SECRET: build_secret_aabbccddeeff00112233445566778899
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID: agent
      # WalletConnect project id — from a repo secret if set, empty
      # otherwise. Next.js bakes NEXT_PUBLIC_* into the client bundle
      # at build time, so this is the only place to inject it (runtime
      # env is too late). Empty here means CI builds ship a wallet UI
      # whose SDK can't initialize; only CD-release builds that include
      # the secret get a working wallet.
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.WALLET_CONNECT_PROJECT_ID || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm build

  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: langgraph_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d langgraph_app_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/langgraph_app_test
      JINA_API_KEYS: jina_test_key_1,jina_test_key_2
      BETTER_AUTH_SECRET: test_secret_aabbccddeeff00112233445566778899
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # `tests/setup.ts` applies migrations via `psql` — install the
      # client. ubuntu-latest doesn't ship with it.
      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
