name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_SK }}
          claude_args: |
            --model ${{ secrets.CLAUDE_MODEL }}
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
