name: langgraph-app

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LangGraph's Python runtime requires Redis at startup (pub/sub + queue
  # init). FF_USE_REDIS_QUEUE=false isn't enough — the connection check
  # still runs. Keep Redis in the stack; disable the queue in env if you
  # don't need it.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # ponytail: env_file replaces the per-var `environment:` block.
    # Every value below (BETTER_AUTH_SECRET, OPENAI_API_KEY, all OAuth /
    # Resend / Alchemy / R2 / Jina / Deno Deploy / LangSmith / observability
    # tunings, etc) lives in `.env` per CLAUDE.md rule #12. Adding a new
    # server-only env is now a one-line change in `.env.example`.
    # Hardcoded service-to-service URLs (DATABASE_URL etc) stay in
    # `environment:` — they're compose-internal, not part of `.env`.
    #
    # Dual-source: `image: ${IMAGE}` pulls the GHCR-published build
    # (used by CD + VPS `docker compose up`); `build:` below is the
    # local-dev fallback (`docker compose up` rebuilds when there's no
    # image cached). `pull` reads `image`; `up` prefers an existing
    # image over a rebuild, so they coexist cleanly.
    image: ${IMAGE}
    build:
      context: .
      # DATABASE_URL is the only remaining build-arg: `next build` opens
      # a Postgres connection at module load (Better Auth runs
      # migrations). The default in Dockerfile points at
      # localhost:5432/langgraph_app; CD overrides via this arg to the
      # build-pg container.
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-langgraph_app}}
    restart: unless-stopped
    env_file: .env
    environment:
      ROLE: all
      NODE_ENV: production
      # App + LangGraph share the same DB; pass both env vars so each
      # process picks up its preferred key (DATABASE_URL for the Next.js
      # auth/checkpointer modules, POSTGRES_URI for langgraph-api).
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-langgraph_app}
      POSTGRES_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-langgraph_app}
      REDIS_URI: redis://redis:6379
      LANGGRAPH_RUNTIME_EDITION: postgres
      PORT: "2024"
      LANGGRAPH_SERVER_HOST: 0.0.0.0
    ports:
      - "3000:3000"
      - "2024:2024"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
